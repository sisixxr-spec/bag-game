<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شنطة المسافر الضايع – Mystery Edition</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    
    <div class="main-wrapper">
        <header>
            <h1><i class="fas fa-plane-departure"></i> لغز الحقيبة المفقودة</h1>
            <p>حللوا المحتويات... واكشفوا الوجهة 🗺️</p>
        </header>

        <div class="game-container">
            <div class="suitcase-section">
                <div class="suitcase-graphic">
                    <i class="fas fa-luggage-cart fa-5x"></i>
                </div>
                <div class="controls">
                    <input type="text" id="itemInput" placeholder="ماذا وجدتم؟ (مثلاً: جواز سفر)">
                    <input type="text" id="reasonInput" placeholder="لماذا؟ (التفسير)">
                    <button onclick="addItem()"><i class="fas fa-plus-circle"></i> أضف للشنطة</button>
                </div>
            </div>

            <div class="investigation-section">
                <h2>📊 لوحة التحقيق</h2>
                <ul id="itemsList">
                    </ul>
            </div>
        </div>

        <footer>
            <button class="guess-btn" onclick="revealMystery()"><i class="fas fa-map-marked-alt"></i> كشف الوجهة النهائية</button>
            <div id="destinationCard" class="hidden">
                <h3>تم حل اللغز 🎉</h3>
                <p>الوجهة هي: <span>السعودية 🇸🇦 (الضيافة والعيد)</span></p>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
