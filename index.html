<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>The Lost Traveler - Mystery Edition</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="luxury-card">
        <header>
            <i class="fas fa-plane-departure gold-icon"></i>
            <h1>The Lost Traveler</h1>
            <p>Analyze the items.. Reveal the story 🕵️‍♀️</p>
        </header>

        <div class="input-group">
            <input type="text" id="itemInput" placeholder="What did you find? (e.g. Passport)">
            <input type="text" id="reasonInput" placeholder="Why is it there? (Your theory)">
            <button onclick="addItem()">Add to Investigation</button>
        </div>

        <ul id="itemsList"></ul>

        <div class="footer-action">
            <button class="reveal-btn" onclick="revealMystery()">Reveal Destination 🗺️</button>
            <div id="destination" class="hidden-box">
                <h3>Destination: Saudi Arabia 🇸🇦</h3>
                <p>Hospitality & Celebration ✨</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
